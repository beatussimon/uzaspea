x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file: ./backend/.env
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ─── Traefik Reverse Proxy (Entrypoint) ────────────────────────
  traefik:
    image: traefik:v2.11
    container_name: uzaspea-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=uzaspea_default"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--accesslog=true"
      - "--metrics.prometheus=true"
      - "--tracing.jaeger=true"
      - "--tracing.jaeger.samplingServerURL=http://jaeger:5778/sampling"
      - "--tracing.jaeger.localAgentHostPort=jaeger:6831"
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080"   # Traefik dashboard (changed from 8080 due to Windows port conflict)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./certs:/etc/certs:ro
      - ./traefik_dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro

  # ─── Backend: Gunicorn (HTTP API) ──────────────────────────────
  backend:
    <<: *backend-common
    container_name: uzaspea-backend
    volumes:
      - ./persistent_data/media:/app/media
      - ./persistent_data/static:/app/staticfiles
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn uzachuo.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    labels:
      - "traefik.enable=true"
      # API routes
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/media`) || PathPrefix(`/static`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  # ─── Backend: Daphne (WebSocket) ───────────────────────────────
  websocket:
    <<: *backend-common
    container_name: uzaspea-websocket
    volumes:
      - ./persistent_data/media:/app/media
    command: daphne -b 0.0.0.0 -p 9000 uzachuo.asgi:application
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.websocket.rule=PathPrefix(`/ws`)"
      - "traefik.http.routers.websocket.entrypoints=websecure"
      - "traefik.http.routers.websocket.tls=true"
      - "traefik.http.services.websocket.loadbalancer.server.port=9000"

  # ─── Celery Worker ─────────────────────────────────────────────
  celery-worker:
    <<: *backend-common
    container_name: uzaspea-celery-worker
    volumes:
      - ./persistent_data/media:/app/media
    command: celery -A uzachuo worker --loglevel=info --concurrency=2

  # ─── Celery Beat ───────────────────────────────────────────────
  celery-beat:
    <<: *backend-common
    container_name: uzaspea-celery-beat
    volumes:
      - ./persistent_data/media:/app/media
    command: celery -A uzachuo beat --loglevel=info

  # ─── Frontend: Nginx (SPA) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost}
    container_name: uzaspea-frontend
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  # ─── Postgres ──────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: uzaspea-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-uzaspea}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./persistent_data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: uzaspea-redis
    volumes:
      - ./persistent_data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Jaeger (Tracing Backend) ──────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: uzaspea-jaeger
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "9411:9411"   # Zipkin

