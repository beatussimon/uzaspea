x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file: ./backend/.env
  environment:
    - DATABASE_URL=${DATABASE_URL}
    - REDIS_URL=${REDIS_URL}
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ─── Traefik Reverse Proxy ──────────────────────────────────────
  traefik:
    image: traefik:v2.11
    container_name: uzaspea-traefik
    command:
      - "--api.insecure=false"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=uzaspea_default"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.web.address=:80"
      # Uncomment when you have a domain:
      # - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      # - "--entrypoints.websecure.address=:443"
      # - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      # - "--certificatesresolvers.letsencrypt.acme.storage=/etc/traefik/acme.json"
      # - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--accesslog=false"
    ports:
      - "80:80"
      # - "443:443"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=PathPrefix(`/traefik-dashboard`)"
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=superuser-auth@file"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik_dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro
      # - ./traefik_acme.json:/etc/traefik/acme.json
    deploy:
      resources:
        limits:
          memory: 80M

  # ─── Backend: Uvicorn ──────────────────────────────────────────
  backend:
    <<: *backend-common
    container_name: uzaspea-backend
    stop_grace_period: 30s
    restart: unless-stopped
    volumes:
      - ./persistent_data/media:/app/media
      - ./persistent_data/static:/app/staticfiles
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             uvicorn uzachuo.asgi:application --host 0.0.0.0 --port 8000 --workers 1 --ws websockets --timeout-graceful-shutdown 30"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/static`) || PathPrefix(`/ws`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    deploy:
      resources:
        limits:
          memory: 400M

  # ─── Celery Worker ─────────────────────────────────────────────
  celery-worker:
    <<: *backend-common
    container_name: uzaspea-celery-worker
    restart: unless-stopped
    volumes:
      - ./persistent_data/media:/app/media
    command: celery -A uzachuo worker --loglevel=warning --concurrency=1 --max-tasks-per-child=50
    deploy:
      resources:
        limits:
          memory: 150M

  # ─── Celery Beat ───────────────────────────────────────────────
  celery-beat:
    <<: *backend-common
    container_name: uzaspea-celery-beat
    restart: unless-stopped
    volumes:
      - ./persistent_data/media:/app/media
      - ./persistent_data/celerybeat:/app/celerybeat
    command: celery -A uzachuo beat --loglevel=warning --schedule /app/celerybeat/celerybeat-schedule
    deploy:
      resources:
        limits:
          memory: 150M

  # ─── Frontend: Nginx SPA ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: uzaspea-frontend
    restart: unless-stopped
    volumes:
      - ./persistent_data/media:/app/media:ro
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          memory: 48M

  # ─── Postgres ──────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: uzaspea-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-uzaspea}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=64MB"
      - "-c"
      - "work_mem=2MB"
      - "-c"
      - "maintenance_work_mem=32MB"
      - "-c"
      - "effective_cache_size=256MB"
      - "-c"
      - "max_connections=30"
    volumes:
      - ./persistent_data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: uzaspea-redis
    restart: unless-stopped
    command: redis-server --maxmemory 32mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - ./persistent_data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
