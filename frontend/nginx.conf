server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve user-uploaded media files directly (use ^~ to prevent regex override)
    location ^~ /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # FIX DEVOPS-11: Map all SPA routes back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Do not cache the entry HTML file to guarantee instant updates
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires -1;
    }

    # Hashed JS/CSS bundles — safe to cache forever (filename changes on rebuild)
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Images — ETag smart cache: browser revalidates on every request.
    # 304 Not Modified = instant load if unchanged. New image = auto-fetched.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        etag on;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }
}
